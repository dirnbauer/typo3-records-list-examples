name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  composer:
    name: Composer validation and audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl, simplexml
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Validate Composer metadata
        run: composer validate --strict --no-check-publish

      - name: Composer audit
        run: composer audit --locked --abandoned=report

  phpstan:
    name: PHPStan level max
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl, simplexml
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

  xml:
    name: XLIFF validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: simplexml
          coverage: none

      - name: Validate XLIFF
        run: php Build/Scripts/validate-xlf.php
